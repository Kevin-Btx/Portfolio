<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olivarius</title>

    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="css/main.css">

</head>

<body>
    <header>
        <nav id="menu" class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
            <a class="navbar-brand " href="#">
                <img src="/Hotel-js/img/Logoblanc.png" height="40" class="logo">
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent"
                aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">

                <span class="navbar-toggler-icon"></span>
            </button>


            <div id="navbarContent" class="navbar-collapse collapse justify-content-end">

                <ul class="navbar-nav">

                    <li class="nav-item">
                        <a class="nav-link" href="#réservation">Nouveau Client</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#leaveCustomer">Départ Client</a>
                    </li>

                </ul>

            </div>

        </nav>
    </header>

    <main class=" mt-5">
        <div class="Accueil d-flex justify-content-center align-items-center text-center ">
            <h1 class="d-flex justify-content-center">Accueil Nouveau client</h1>
        </div>
        <div id="réservation">
            <form>
                <div class="row g-">
                    <div class="col-md ">
                        <label for="InputFirstname" class="form-label"> Prénom</label>
                        <input id="firstname" type="text" class="form-control rounded-0">
                    </div>

                    <div class="col-md">
                        <label for="InputLastname" class="form-label">Nom</label>
                        <input id="lastname" type="text" class="form-control rounded-0">
                    </div>

                    <div class="col-md">
                        <label for="InputDay" class="form-label">Nombre de nuits</label>
                        <input id="night" type="text" class="form-control rounded-0">
                    </div>

                    <div class="col-md">
                        <label class="form-label" for="InputPerson">Chambre</label>
                        <select name="country" id="InputPerson" class="form-select">
                            <option value="1personne"> Chambre 1 personne</option>
                            <option value="2personne"> Chambre 2 personnes</option>
                            <option value="4personne"> Chambre 4 personnes</option>
                            <option value="loft"> Loft </option>
                        </select>
                    </div>

                    <div class="col-md">
                        <p>Petit déjeuner ?</p>
                        <input type="radio" id="radioYes" name="breakfast" value="Yes">
                        <label for="radioYes">Oui</label>

                        <input type="radio" id="radioNo" name="breakfast" value="No">
                        <label for="radioNo">Non</label>
                    </div>

                    <div class="col-md">
                        <button class=" send w-100 h-100">
                            Enregistrer le client
                            <i class="fa-regular fa-calendar"></i>
                        </button>
                    </div>

                </div>
            </form>
        </div>

        <div class="leave d-flex justify-content-center align-items-center text-center">
            <h2 class="d-flex justify-content-center">Départ client</h2>
        </div>
        <div id="leaveCustomer">
            <form>
                <div class="row justify-content-center ">
                    <div class="col-md-2 ">
                        <label for="InputFirstname" class="form-label"> Prénom</label>
                        <input  id="searchFirstname" type="text" class="form-control rounded-0">
                    </div>

                    <div class="col-md-2">
                        <label for="InputLastname" class="form-label">Nom</label>
                        <input id="searchLastname" type="text" class="form-control rounded-0">
                    </div>

                    <div class="col-md-2">
                        <button class=" send w-100 h-100">
                            Rechercher
                            <i class="fa-regular fa-user"></i>
                        </button>
                    </div>

            </form>
        </div>
    </main>



    <script src="js/bootstrap.js"></script>
    <script src="https://kit.fontawesome.com/4b97452bb1.js" crossorigin="anonymous"></script>
    <script src="js/main.js"></script>
    <script src="js/Register.js"></script>
    <script src="js/facture.js"></script>
</body>

</html>
